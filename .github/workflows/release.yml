name: Release tablet installers

# Triggers:
#   - push to main          -> 5-sec validate job (green check, no installers)
#   - git tag v*            -> matrix build (Win / Mac / Linux desktop)
#   - workflow_dispatch     -> same as a tag
#
# Mobile builds (iOS / Android) are not in this workflow yet — they need
# Apple Developer + Android keystore secrets. Add when those are set up.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  validate:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Confirm workflow file parses
        run: |
          echo "✅ Push to branch '${{ github.ref_name }}' — installer builds only run on git tags (v*)."
          echo "To cut a release: git tag v0.X.Y && git push origin v0.X.Y"

  build:
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, target: x86_64-pc-windows-msvc,   label: windows-x64 }
          - { os: macos-latest,   target: aarch64-apple-darwin,     label: macos-arm64 }
          - { os: macos-latest,   target: x86_64-apple-darwin,      label: macos-x64 }
          - { os: ubuntu-22.04,   target: x86_64-unknown-linux-gnu, label: linux-x64 }

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with: { version: 9 }

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with: { targets: ${{ matrix.target }} }

      - name: Cache Rust target
        uses: Swatinem/rust-cache@v2
        with: { workspaces: "src-tauri -> target" }

      - name: pnpm install
        run: pnpm install --frozen-lockfile=false

      - name: Tauri build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "케어닥 태블릿 ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: care-home-tablet-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
          retention-days: 14
